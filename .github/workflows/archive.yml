name: Archive Richemont Alaïa Jobs
on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:
jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Archive page via Wayback Machine
        run: |
          URL="https://careers.richemont.com/en/jobs/alaia/?search=&country=France&location=Paris&pattern=On-Site&pagesize=20"
          DATE=$(date '+%Y-%m-%d %H:%M UTC')

          HEADERS=$(curl -s -D - -o /dev/null \
            --max-time 60 \
            -A "Mozilla/5.0 (compatible; archive-bot)" \
            "https://web.archive.org/save/$URL")

          echo "--- HEADERS BRUTS ---" >> archive_log.txt
          echo "$HEADERS" >> archive_log.txt

          ARCHIVE_PATH=$(echo "$HEADERS" | grep -i "Content-Location:" | tr -d '\r' | awk '{print $2}')

          if [ -n "$ARCHIVE_PATH" ]; then
            ARCHIVE_URL="https://web.archive.org$ARCHIVE_PATH"
            echo "$DATE - ✅ Archive créée : $ARCHIVE_URL" >> archive_log.txt
          else
            echo "$DATE - ❌ Échec de l'archivage" >> archive_log.txt
          fi

      - name: Sauvegarder le log
        uses: actions/upload-artifact@v4
        with:
          name: archive-log
          path: archive_log.txt
